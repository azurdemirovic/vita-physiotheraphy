<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TANGAN — Prendre rendez-vous</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="brand">TANGAN</a>

    <nav class="desktop-nav">
      <a href="index.html#reflexologie-section">REFLEXOLOGIE</a>
      <a href="index.html#massage-section">MASSAGE</a>
      <a href="index.html#physioscan">PHYSIOSCAN</a>
      <a href="index.html#contact">CONTACT</a>
    </nav>

    <button class="menu-toggle" aria-label="Open menu">☰</button>
  </header>

  <nav class="mobile-nav">
    <a href="index.html#reflexologie-section">REFLEXOLOGIE</a>
    <a href="index.html#massage-section">MASSAGE</a>
    <a href="index.html#physioscan">PHYSIOSCAN</a>
    <a href="index.html#contact">CONTACT</a>
  </nav>

  <main class="booking-page">
    <div class="booking-container">
      <h1 class="booking-title">Prendre<br>rendez-vous</h1>
      <p class="booking-subtitle">
        Remplissez le formulaire ci-dessous et nous vous recontacterons dans les plus brefs délais.
      </p>

      <form class="booking-form" action="#" method="POST">
        <div class="form-row">
          <div class="form-group">
            <label for="service">Type de soin</label>
            <select id="service" name="service" required>
              <option value="">Choisissez un soin</option>
              <option value="reflexologie">Réflexologie plantaire</option>
              <option value="abhyanga">Massage Abhyanga</option>
              <option value="ayurvedique">Massage Ayurvédique</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="name">Nom</label>
            <input type="text" id="name" name="name" placeholder="Votre nom" required>
          </div>

          <div class="form-group">
            <label for="surname">Prénom</label>
            <input type="text" id="surname" name="surname" placeholder="Votre prénom" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required>
          </div>

          <div class="form-group">
            <label for="phone">Téléphone</label>
            <input type="tel" id="phone" name="phone" placeholder="+33 6 00 00 00 00" required>
          </div>
        </div>

        <button type="submit" class="booking-button">Envoyer</button>
      </form>

      <a href="index.html" class="booking-back">← Retour à l'accueil</a>
    </div>
  </main>

  <script>
    const toggle = document.querySelector('.menu-toggle');
    const mobileNav = document.querySelector('.mobile-nav');

    toggle.addEventListener('click', () => {
      mobileNav.classList.toggle('open');
    });

    document.querySelectorAll('.mobile-nav a').forEach(link => {
      link.addEventListener('click', () => {
        mobileNav.classList.remove('open');
      });
    });

    const params = new URLSearchParams(window.location.search);
    const massage = params.get('massage');
    const serviceSelect = document.getElementById('service');

    if (massage && serviceSelect) {
      serviceSelect.value = massage;
    }
  </script>
</body>
</html>
